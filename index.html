<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Sona ❤️ | A Small World Made Only For You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #ff4d6d;
            --bg-dark: #0a0a0c;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ambient Background Glow */
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 77, 109, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
            filter: blur(50px);
        }

        /* Floating Hearts */
        .heart {
            position: absolute;
            color: rgba(255, 77, 109, 0.6);
            pointer-events: none;
            animation: float Up linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* Typing Animation */
        .typing-container {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            text-align: center;
            min-height: 4rem;
            text-shadow: 0 0 15px rgba(255, 77, 109, 0.5);
        }

        .cursor {
            display: inline-block;
            width: 3px;
            background-color: var(--primary-glow);
            margin-left: 5px;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Button Styling */
        .glowing-btn {
            position: relative;
            background: transparent;
            border: 2px solid var(--primary-glow);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 1px;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 0 10px rgba(255, 77, 109, 0.3);
            opacity: 0; /* Initially hidden */
            transform: translateY(20px);
        }

        .glowing-btn.show {
            opacity: 1;
            transform: translateY(0);
        }

        .glowing-btn:hover {
            background: var(--primary-glow);
            box-shadow: 0 0 30px var(--primary-glow);
            transform: scale(1.05);
        }

        /* Page Transition Overlay */
        #transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        /* Mobile specific adjustments */
        @media (max-width: 640px) {
            .typing-container { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div id="transition-overlay"></div>

    <div class="flex flex-col items-center justify-center space-y-12 z-10 px-6">
        <div class="typing-container">
            <span id="text"></span><span class="cursor">|</span>
        </div>

        <button id="enter-btn" class="glowing-btn" onclick="handleNavigation()">
            Enter My Heart ❤️
        </button>
    </div>

    <!-- Hidden audio element - browsers often require interaction to play -->
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const textElement = document.getElementById('text');
        const phrases = ["Hello Sona...", "Aap ke liye kuch khaas banaya hai ❤️"];
        const btn = document.getElementById('enter-btn');
        const audio = document.getElementById('bg-music');
        
        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function type() {
            const currentPhrase = phrases[phraseIndex];
            
            if (isDeleting) {
                textElement.innerText = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
            } else {
                textElement.innerText = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = 100;
            
            if (!isDeleting && charIndex === currentPhrase.length) {
                if (phraseIndex === phrases.length - 1) {
                    // Stop at the end of the last phrase and show button
                    btn.classList.add('show');
                    return;
                }
                typeSpeed = 2000; // Pause at end
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex++;
                typeSpeed = 500;
            }

            setTimeout(type, typeSpeed);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        function handleNavigation() {
            const overlay = document.getElementById('transition-overlay');
            overlay.style.opacity = '1';
            setTimeout(() => {
                // In a real scenario, this would go to sorry.html
                // Using a fallback for demonstration
                window.location.href = 'sorry.html';
            }, 1000);
        }

        // Initialize
        window.onload = () => {
            type();
            setInterval(createHeart, 300);
            
            // Try to play audio on first click anywhere (browser policy)
            document.body.addEventListener('click', () => {
                audio.volume = 0.3;
                audio.play().catch(e => console.log("Autoplay prevented"));
            }, { once: true });
        };
    </script>
</body>
</html>
